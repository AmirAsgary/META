# META environment
# Install:  mamba env create -f environment.yml
# Activate: mamba activate meta
#
# PyTorch is installed via pip because only pip reliably gets
# the correct CUDA build. Using cu126 wheels below — these run
# on any CUDA driver >= 12.6 (your driver 580 / CUDA 13.0 is fine).
#
# If you need a different CUDA toolkit version, swap the URL:
#   CUDA 12.6: https://download.pytorch.org/whl/cu126
#   CUDA 12.4: https://download.pytorch.org/whl/cu124
#   CUDA 12.1: https://download.pytorch.org/whl/cu121
#   CUDA 11.8: https://download.pytorch.org/whl/cu118
#   CPU only:  https://download.pytorch.org/whl/cpu
#
# Check your driver: nvidia-smi | head -3
name: meta
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - numpy>=1.24
  - scipy>=1.10
  - lmdb>=1.4
  - prody>=2.4
  - biopython>=1.83
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch>=2.2
